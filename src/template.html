<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
</head>
<body>
    <div class="appContainer">
        <div class="todayWeather">
            <div id="location"></div>
            <div id="currentTemp"></div>
            <div class="pairing">
                <div>Feels Like:</div>
                <div id="feelsLike"></div>
            </div>   
            <div id="todayRange"></div>
            <div id="todayHumidity"></div>
        </div>
        <div class="weekCards">
            <div class="dayCard" id="dayOne">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayTwo">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayThree">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayFour">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayFive">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="daySix">
                <div class="left"></div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
