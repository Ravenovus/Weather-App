<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
</head>
<body>
    <div class="formGroup">
        <button class="unitSwap" id="Celsius">C</button>
        <input type="text" name="cityName" id="cityName" maxlength="50" placeholder="Tokyo/New York/Berlin" >
        <button id="lookupWeatherButton">Show Weather</button>
    </div>
    <div class="appContainer">
        <div class="todayWeather">
            <div class="column">
                <div class="columnPair">
                    <div id="location"></div>
                    <div id="currentCondition"></div>
                </div>
                <div class="pairing">
                    <div>Feels Like:</div>
                    <div id="feelsLike"></div>
                </div>   
                <div id="todayRange"></div>
                <div class="pairing">
                    <div>Humidity:</div>
                    <div id="todayHumidity"></div>
                </div>  

            </div>
            <div class="cloumn">
                <div>
                    <div id="currentTemp"></div>
                    <img src="//:0" id="currentIcon" alt="">
                </div> 
            </div>
        </div>
        <div class="weekCards">
            <div class="dayCard" id="dayOne">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayTwo">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayThree">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayFour">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="dayFive">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>
            <div class="dayCard" id="daySix">
                <div class="left">
                    <img src="//:0" class="weatherIcon">
                    <div class="weatherDescription"></div>
                </div>
                <div class="right">
                    <div class="dayName"></div>
                    <div class="dayTemperatures"></div>
                </div>
            </div>

        </div>
    </div>
    <dialog id="inputError">
        <h1>Input Error!</h1>
        <p class="error">We couldnt find the city you inserted</p>
        <button id="errorAccept">Ok</button>
    </dialog>
</body>
</html>
